<head>
<meta charset="UTF-8">
<title>knitting </title>
<link rel="stylesheet" href="order.css"> 
</head>
<body>
<div class="order">
    <h2>Оформить заказ</h2>
    <h1>Чем подробнее вы опишете изделие своей мечты, тем легче нам будет его сделать</h1>
    <form class="order-form">
        <input type="text" placeholder="Ваше имя" required>
        <h3>Пожалуйста, пишите настоящее имя </h3>
        <input type="email" placeholder="Email" required>
        <textarea placeholder='Опишите, что вы хотите. . Например: "Синий свитер размера XS из натуральной шерсти на день рождения дочери"' rows="4"></textarea>
        <h3>Опишите цвет, размер изделия, предпочтительнвй материал, кому и на какой повод предназначено изделие</h3>
        <select>
            <option>Выберите тип изделия</option>
            <option>Аксессуар</option>
            <option>Игрушка</option>
            <option>Одежда</option>
            <option>Другое</option>
        </select>
        <h3>Это поможет нам сортировать заявки</h3>
        <button type="submit">Отправить заявку</button>
    </form>
</div>
</body>
